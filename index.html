<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jubeat Emblem Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <h1>Jubeat Emblem Builder</h1>

    <div class="layout">

      <!-- Preview Window -->
      <div class="preview-panel">
        <div class="preview-window" id="previewWindow">
          <img class="layer-img" id="preview-layer1" src="" alt="" />
          <img class="layer-img" id="preview-layer2" src="" alt="" />
          <img class="layer-img" id="preview-layer3" src="" alt="" />
          <img class="layer-img" id="preview-layer4" src="" alt="" />
          <img class="layer-img" id="preview-layer5" src="" alt="" />
        </div>

        <div class="preview-actions">
          <button id="exportBtn">⬇ Export JSON</button>
          <button id="importBtn">⬆ Import JSON</button>
          <input type="file" id="importFile" accept=".json" style="display:none;" />
        </div>

        <div class="active-selections" id="activeSelections">
          <!-- Active layer names shown here -->
        </div>
      </div>

      <!-- Layer Panels -->
      <div class="layers-panel" id="layersPanel">
        <!-- Generated by JS -->
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
